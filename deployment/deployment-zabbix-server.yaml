---
# Source: zabbix/templates/deployment-zabbix-server.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zabbix-zabbix-server
  namespace: avacameron
  labels:
    helm.sh/chart: zabbix-7.0.12
    app.kubernetes.io/name: zabbix
    app.kubernetes.io/instance: zabbix
    app.kubernetes.io/version: "7.0.16"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: server
  annotations:
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: zabbix
      app.kubernetes.io/instance: zabbix
      app.kubernetes.io/component: server
  template:
    metadata:
      annotations:
      labels:
        helm.sh/chart: zabbix-7.0.12
        app.kubernetes.io/name: zabbix
        app.kubernetes.io/instance: zabbix
        app.kubernetes.io/version: "7.0.16"
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/component: server
    spec:
      serviceAccountName: zabbix
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 1
            podAffinityTerm:
              topologyKey: kubernetes.io/hostname
              labelSelector:
                matchLabels:
                  app.kubernetes.io/name: zabbix
                  app.kubernetes.io/instance: zabbix
                  app.kubernetes.io/component: server
      containers:
        - name: zabbix-server
          resources:
            {}
          securityContext:
            {}
          image: "zabbix/zabbix-server-pgsql:ubuntu-7.0.16"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 10051
              name: zabbix-server
            - containerPort: 10052
              name: zabbix-jmx
          env:
            
            
            - name: DB_SERVER_HOST
              value: zabbix-postgresql
            - name: DB_SERVER_PORT
              value: "5432"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: zabbix-db-access
                  key: user
                  optional: true
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: zabbix-db-access
                  key: password
            - name: POSTGRES_DB
              value: "zabbix"
            - name: ZBX_NODEADDRESS
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: ZBX_WEBSERVICEURL
              value: "http://zabbix-zabbix-webservice:10053/report"
            - name: ZBX_STARTREPORTWRITERS
              value: "1"
            - name: ZBX_JAVAGATEWAY_ENABLE
              value: "false"
            - name: ZBX_WEBDRIVERURL
              value: http://zabbix-chrome:4444
        - name: zabbix-agent
          resources:
            {}
          securityContext:
            {}
          image: "zabbix/zabbix-agent2:ubuntu-7.0.16"
          imagePullPolicy: IfNotPresent
          env:
            - name: ZBX_HOSTNAME
              value: "Zabbix server"
            - name: ZBX_SERVER_HOST
              value: "0.0.0.0/0"
            - name: ZBX_SERVER_PORT
              value: "10051"
            - name: ZBX_PASSIVE_ALLOW
              value: "true"
            - name: ZBX_PASSIVESERVERS
              value: 
            - name: ZBX_ACTIVE_ALLOW
              value: "false"
            - name: ZBX_ACTIVESERVERS
              value: 
            - name: ZBX_DEBUGLEVEL
              value: "3"
            - name: ZBX_TIMEOUT
              value: "4"
            - name: ZBX_LOADMODULE
              value: 
          ports:
            - name: zabbix-agent
              containerPort: 10050
              protocol: TCP
          livenessProbe:
            failureThreshold: 3
            periodSeconds: 10
            successThreshold: 1
            tcpSocket:
              port: zabbix-agent
            timeoutSeconds: 3
          startupProbe:
            failureThreshold: 5
            initialDelaySeconds: 15
            periodSeconds: 5
            successThreshold: 1
            tcpSocket:
              port: zabbix-agent
            timeoutSeconds: 3
      imagePullSecrets:
      volumes:
